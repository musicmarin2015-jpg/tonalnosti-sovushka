<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тональности с Совушкой</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .game-wrapper {
            width: 100%;
            max-width: 1000px;
            max-height: 98vh;
            overflow: hidden;
        }

        .header {
            background: white;
            border-radius: 25px;
            padding: 20px 30px;
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            position: relative;
        }

        .owl-section {
            display: flex;
            align-items: center;
            gap: 20px;
            flex: 1;
        }

        .owl-image {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: visible;
            border: 5px solid #667eea;
            position: relative;
            flex-shrink: 0;
        }

        .owl-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .owl-image.happy {
            animation: owlJump 0.8s ease;
        }

        @keyframes owlJump {
            0% { transform: translateY(0) scale(1); }
            20% { transform: translateY(-30px) scale(1.15); }
            40% { transform: translateY(0) scale(1); }
            60% { transform: translateY(-20px) scale(1.08); }
            80% { transform: translateY(0) scale(1); }
            100% { transform: translateY(0) scale(1); }
        }

        .owl-image.sad {
            animation: owlSad 0.6s ease;
        }

        @keyframes owlSad {
            0%, 100% { transform: rotate(0); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .owl-title {
            color: #667eea;
            font-size: 2.2em;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        /* ===== КЛИКАБЕЛЬНАЯ СТРЕЛКА В ШАПКЕ ===== */
        .header-arrow {
            font-size: 2.5em;
            color: #4caf50;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0;
            transform: translateX(-20px);
            display: none;
            padding: 10px 20px;
            border-radius: 15px;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
            user-select: none;
        }

        .header-arrow.show {
            display: block;
            opacity: 1;
            transform: translateX(0);
            animation: arrowAppear 0.5s ease;
        }

        .header-arrow:hover {
            transform: scale(1.15);
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.5);
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
        }

        @keyframes arrowAppear {
            0% {
                opacity: 0;
                transform: translateX(-20px) scale(0.5);
            }
            50% {
                transform: translateX(0) scale(1.2);
            }
            100% {
                opacity: 1;
                transform: translateX(0) scale(1);
            }
        }

        .score-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 1.3em;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            min-width: 140px;
        }

        .score-box .score-num {
            font-size: 1.8em;
            display: block;
            margin-top: 5px;
        }

        .notes-container {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            pointer-events: none;
            z-index: 50;
        }

        .flying-note {
            position: absolute;
            font-size: 2em;
            pointer-events: none;
            animation: flyNote 1.2s ease-out forwards;
        }

        @keyframes flyNote {
            0% {
                transform: translate(0, 0) scale(0) rotate(0deg);
                opacity: 1;
            }
            50% { opacity: 1; }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(1.3) rotate(var(--rot));
                opacity: 0;
            }
        }

        .main-content {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        .task {
            background: linear-gradient(135deg, #f8f9ff 0%, #e8eaff 100%);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border: 4px solid #667eea;
        }

        .task-text {
            font-size: 1.6em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .audio-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .play-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 40px;
            font-size: 1.4em;
            border-radius: 35px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .play-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.5);
        }

        .play-button:active {
            transform: translateY(-1px);
        }

        .key-signature {
            background: white;
            border: 3px solid #ddd;
            border-radius: 15px;
            padding: 15px 25px;
            text-align: center;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        .key-signature img {
            max-width: 100%;
            height: auto;
            max-height: 100px;
        }

        .answers {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .answer-button {
            background: linear-gradient(135deg, #f8f9ff 0%, #e8eaff 100%);
            border: 4px solid #667eea;
            color: #667eea;
            padding: 20px 25px;
            font-size: 1.4em;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .answer-button:hover:not(:disabled) {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 15px rgba(102, 126, 234, 0.4);
        }

        .answer-button:disabled {
            cursor: not-allowed;
            opacity: 0.9;
        }

        .answer-button.correct {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
            border-color: #4caf50;
            color: white;
            animation: pulse 0.5s;
            box-shadow: 0 6px 15px rgba(76, 175, 80, 0.4);
        }

        .answer-button.wrong {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
            border-color: #f44336;
            color: white;
            animation: shake 0.5s;
            box-shadow: 0 6px 15px rgba(244, 67, 54, 0.4);
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-15px); }
            75% { transform: translateX(15px); }
        }

        .feedback-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .feedback {
            font-size: 1.5em;
            font-weight: bold;
            padding: 15px 25px;
            border-radius: 15px;
            background: #f8f9ff;
            text-align: center;
        }

        .feedback.correct {
            color: #4caf50;
            background: #e8f5e9;
            border: 3px solid #4caf50;
        }

        .feedback.wrong {
            color: #f44336;
            background: #ffebee;
            border: 3px solid #f44336;
        }

        /* Стрелка для перехода */
        .next-arrow {
            font-size: 3em;
            color: #4caf50;
            cursor: pointer;
            padding: 10px 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
            transition: all 0.3s;
            display: none;
            animation: arrowPulse 1s ease infinite;
            user-select: none;
        }

        .next-arrow:hover {
            transform: scale(1.2);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
        }

        @keyframes arrowPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @media (max-width: 768px) {
            .answers {
                grid-template-columns: 1fr;
            }
            
            .owl-title {
                font-size: 1.6em;
            }

            .owl-image {
                width: 90px;
                height: 90px;
            }

            .header {
                padding: 15px 20px;
                flex-wrap: wrap;
            }

            .main-content {
                padding: 20px;
            }

            .task-text {
                font-size: 1.3em;
            }

            .play-button {
                font-size: 1.2em;
                padding: 15px 30px;
            }

            .answer-button {
                font-size: 1.2em;
                padding: 18px 20px;
            }

            .feedback {
                font-size: 1.2em;
            }

            .next-arrow {
                font-size: 2.5em;
            }

            .header-arrow {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <div class="header">
            <div class="owl-section">
                <div class="owl-image" id="owlImage">
                    <img src="owl.png" alt="Совушка">
                    <div class="notes-container" id="notesContainer"></div>
                </div>
                <div class="owl-title">Тональности с Совушкой</div>
            </div>
            
            <!-- КЛИКАБЕЛЬНАЯ СТРЕЛКА -->
            <div class="header-arrow" id="headerArrow" onclick="nextQuestion()" title="Следующий вопрос">➡️</div>
            
            <div class="score-box">
                <span>📊 Счёт:</span>
                <span class="score-num" id="score">0 / 0</span>
            </div>
        </div>

        <div class="main-content">
            <div class="task">
                <div class="task-text">🎵 Послушай мелодию и определи тональность!</div>
                
                <div class="audio-row">
                    <button class="play-button" onclick="playAudio()">
                        🔊 Послушать мелодию
                    </button>
                    <div class="key-signature">
                        <img src="" alt="Ключевые знаки" id="keySignatureImage">
                    </div>
                </div>
            </div>

            <div class="answers">
                <button class="answer-button" onclick="checkAnswer('C')">🎼 До мажор (C-dur)</button>
                <button class="answer-button" onclick="checkAnswer('D')">🎼 Ре мажор (D-dur)</button>
                <button class="answer-button" onclick="checkAnswer('G')">🎼 Соль мажор (G-dur)</button>
                <button class="answer-button" onclick="checkAnswer('F')">🎼 Фа мажор (F-dur)</button>
            </div>

            <div class="feedback-row">
                <div class="feedback" id="feedback"></div>
            </div>
            
            <!-- Стрелка для перехода -->
            <div style="text-align: center; margin-top: 15px;">
                <div class="next-arrow" id="nextArrow" onclick="nextQuestion()" title="Следующий вопрос">➡️</div>
            </div>
        </div>
    </div>

    <audio id="audioC" src="melody-c-major.mp3" preload="auto"></audio>
    <audio id="audioD" src="melody-d-major.mp3" preload="auto"></audio>
    <audio id="audioG" src="melody-g-major.mp3" preload="auto"></audio>
    <audio id="audioF" src="melody-f-major.mp3" preload="auto"></audio>

    <script>
        const baseQuestions = [
            { answer: 'C', audio: 'audioC', signature: 'key-c.png' },
            { answer: 'D', audio: 'audioD', signature: 'key-d.png' },
            { answer: 'G', audio: 'audioG', signature: 'key-g.png' },
            { answer: 'F', audio: 'audioF', signature: 'key-f.png' }
        ];

        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        let questions = shuffleArray(baseQuestions);
        let currentQuestion = 0;
        let score = 0;
        let totalQuestions = 0;

        const audioContext = new (window.AudioContext || window.webkitAudioContext)();

        function playHappySound() {
            const notes = [523.25, 659.25, 783.99, 1046.50];
            const now = audioContext.currentTime;
            
            notes.forEach((freq, index) => {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = freq;
                oscillator.type = 'sine';
                
                const startTime = now + index * 0.08;
                const duration = 0.15;
                
                gainNode.gain.setValueAtTime(0, startTime);
                gainNode.gain.linearRampToValueAtTime(0.3, startTime + 0.02);
                gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                
                oscillator.start(startTime);
                oscillator.stop(startTime + duration);
            });

            setTimeout(() => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = 1318.51;
                osc.type = 'sine';
                gain.gain.setValueAtTime(0, now + 0.35);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.37);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                osc.start(now + 0.35);
                osc.stop(now + 0.6);
            }, 0);
        }

        function playSadSound() {
            const notes = [440, 415.30, 392];
            const now = audioContext.currentTime;
            
            notes.forEach((freq, index) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.value = freq;
                osc.type = 'triangle';
                
                const startTime = now + index * 0.15;
                
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.2, startTime + 0.03);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + 0.2);
                
                osc.start(startTime);
                osc.stop(startTime + 0.2);
            });
        }

        const noteSymbols = ['♪', '♫', '', '🎵', '🎶', ''];
        const noteColors = ['#FFD700', '#FF6B6B', '#4CAF50', '#2196F3', '#9C27B0', '#FF9800'];

        function launchNotes() {
            const container = document.getElementById('notesContainer');
            const numNotes = 12;

            for (let i = 0; i < numNotes; i++) {
                setTimeout(() => {
                    const note = document.createElement('div');
                    note.className = 'flying-note';
                    note.textContent = noteSymbols[Math.floor(Math.random() * noteSymbols.length)];
                    note.style.color = noteColors[Math.floor(Math.random() * noteColors.length)];

                    const angle = (Math.PI * 2 * i) / numNotes + (Math.random() - 0.5);
                    const distance = 90 + Math.random() * 60;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance - 30;
                    const rot = (Math.random() - 0.5) * 720;

                    note.style.setProperty('--tx', tx + 'px');
                    note.style.setProperty('--ty', ty + 'px');
                    note.style.setProperty('--rot', rot + 'deg');

                    container.appendChild(note);

                    setTimeout(() => {
                        if (note.parentNode) {
                            note.parentNode.removeChild(note);
                        }
                    }, 1200);
                }, i * 60);
            }
        }

        function animateOwl(isHappy) {
            const owl = document.getElementById('owlImage');
            owl.classList.remove('happy', 'sad');
            void owl.offsetWidth;
            
            if (isHappy) {
                owl.classList.add('happy');
                playHappySound();
                launchNotes();
            } else {
                owl.classList.add('sad');
                playSadSound();
            }

            setTimeout(() => {
                owl.classList.remove('happy', 'sad');
            }, 1000);
        }

        function playAudio() {
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }
            const audio = document.getElementById(questions[currentQuestion].audio);
            audio.currentTime = 0;
            audio.play().catch(err => {
                console.error('Ошибка:', err);
                alert('Не удалось воспроизвести аудио. Проверь файл: ' + audio.src);
            });
        }

        function checkAnswer(selected) {
            const correct = questions[currentQuestion].answer;
            const buttons = document.querySelectorAll('.answer-button');
            const feedback = document.getElementById('feedback');
            const nextArrow = document.getElementById('nextArrow');
            const headerArrow = document.getElementById('headerArrow');

            totalQuestions++;
            buttons.forEach(btn => btn.disabled = true);

            if (selected === correct) {
                score++;
                feedback.textContent = '🎉 Правильно! Молодец!';
                feedback.className = 'feedback correct';
                buttons.forEach(btn => {
                    if (btn.textContent.includes(getKeyFullName(correct))) {
                        btn.classList.add('correct');
                    }
                });
                animateOwl(true);
            } else {
                feedback.textContent = '❌ Неправильно. Правильный ответ: ' + getKeyFullName(correct);
                feedback.className = 'feedback wrong';
                buttons.forEach(btn => {
                    if (btn.textContent.includes(getKeyFullName(selected))) {
                        btn.classList.add('wrong');
                    }
                    if (btn.textContent.includes(getKeyFullName(correct))) {
                        btn.classList.add('correct');
                    }
                });
                animateOwl(false);
            }

            updateScore();
            
            // Показываем ОБЕ стрелки
            nextArrow.style.display = 'block';
            headerArrow.classList.add('show');
        }

        function getKeyFullName(key) {
            const names = {
                'C': 'До мажор',
                'D': 'Ре мажор',
                'G': 'Соль мажор',
                'F': 'Фа мажор'
            };
            return names[key];
        }

        function nextQuestion() {
            currentQuestion++;
            
            if (currentQuestion >= questions.length) {
                showFinalResult();
                return;
            }

            const feedback = document.getElementById('feedback');
            const nextArrow = document.getElementById('nextArrow');
            const headerArrow = document.getElementById('headerArrow');
            const buttons = document.querySelectorAll('.answer-button');
            const keySignatureImage = document.getElementById('keySignatureImage');

            feedback.textContent = '';
            feedback.className = 'feedback';
            
            // Скрываем ОБЕ стрелки
            nextArrow.style.display = 'none';
            headerArrow.classList.remove('show');

            buttons.forEach(btn => {
                btn.disabled = false;
                btn.classList.remove('correct', 'wrong');
            });

            keySignatureImage.src = questions[currentQuestion].signature;
        }

        function showFinalResult() {
            const wrapper = document.querySelector('.game-wrapper');
            const percentage = Math.round((score / totalQuestions) * 100);
            
            let message = '';
            let emoji = '';
            if (percentage === 100) {
                message = '🏆 Превосходно! Все ответы правильные!';
                emoji = '🏆';
                animateOwl(true);
            } else if (percentage >= 75) {
                message = '🌟 Отлично! Очень хороший результат!';
                emoji = '🌟';
            } else if (percentage >= 50) {
                message = '👍 Хороший результат! Продолжай!';
                emoji = '👍';
            } else {
                message = '💪 Не сдавайся! Попробуй ещё раз!';
                emoji = '💪';
            }

            wrapper.innerHTML = `
                <div style="background: white; border-radius: 25px; padding: 40px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                    <div style="font-size: 5em; margin-bottom: 20px;">${emoji}</div>
                    <div style="font-size: 2.2em; color: #667eea; margin-bottom: 20px; font-weight: bold;">${message}</div>
                    <div style="font-size: 2em; color: #333; margin-bottom: 30px;">
                        Результат: <strong>${score}</strong> из <strong>${totalQuestions}</strong> (${percentage}%)
                    </div>
                    <button class="play-button" onclick="location.reload()" style="font-size: 1.5em; padding: 20px 50px;">
                        🔄 Играть снова
                    </button>
                </div>
            `;
        }

        function updateScore() {
            document.getElementById('score').textContent = score + ' / ' + totalQuestions;
        }

        window.onload = function() {
            const keySignatureImage = document.getElementById('keySignatureImage');
            keySignatureImage.src = questions[0].signature;
        };
    </script>
</body>
</html>
